<style>

  @page { size: 92mm 56mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body { font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
         letter-spacing: -0.02em; }
  .card { width: 92mm; height: 56mm; page-break-after: always; position: relative; overflow: hidden; }

  /* ═══ 앞면: 큰 글씨 + 큰 QR ═══ */
  .front { background: #123e33; color: #fff; }
  /* 배경 경로 모티프: 점선 길 */
  .route-deco { position: absolute; left: -2mm; bottom: 7mm; width: 60mm; height: 14mm; opacity: .35; }
  .front .inner { position: absolute; inset: 4.5mm; display: flex; gap: 4.5mm; align-items: center; }
  .front .left { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100%; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 2.2mm; }
  .brand .truck { font-size: 6.5mm; line-height: 1; }
  .brand .name { font-size: 6.2mm; font-weight: 900; line-height: 1.1; }
  .brand .sub { font-size: 2.7mm; font-weight: 700; color: #9fd9c3; margin-top: 0.8mm; }
  .headline { font-size: 5mm; font-weight: 900; line-height: 1.4; }
  .headline .gold { color: #ffcf70; }
  .bottom-row { display: flex; align-items: baseline; gap: 2.5mm; }
  .free { background: #ffcf70; color: #3a2800; font-weight: 900; font-size: 3.3mm;
          padding: 1.2mm 3mm; border-radius: 99px; white-space: nowrap; }
  .url { font-size: 4.2mm; font-weight: 900; color: #9fd9c3; letter-spacing: 0; }
  .qr-panel { background: #fff; border-radius: 3mm; padding: 2.2mm 2.2mm 1.8mm; text-align: center; flex-shrink: 0;
              box-shadow: 0 1mm 3mm rgba(0,0,0,.35); }
  .qr-panel img { width: 27mm; height: 27mm; display: block; }
  .qr-cap { font-size: 2.9mm; color: #123e33; font-weight: 900; margin-top: 1.2mm; }

  /* ═══ 뒷면: 사용법 3단계 — 큰 글씨 ═══ */
  .back { background: #ffffff; color: #172b23; }
  .back .inner { position: absolute; inset: 4mm 4.5mm; display: flex; flex-direction: column; }
  .back h2 { font-size: 4.3mm; font-weight: 900; color: #123e33; margin-bottom: 2.2mm; }
  .back h2 .n3 { color: #b26a10; }
  .steps { display: flex; flex-direction: column; gap: 1.5mm; margin-bottom: 2mm; }
  .step { display: flex; align-items: center; gap: 2.5mm; background: #f1f8f4;
          border-radius: 2.5mm; padding: 1.6mm 2.5mm; }
  .step .n { width: 5.5mm; height: 5.5mm; border-radius: 99px; background: #1e6b5a; color: #fff;
             display: flex; align-items: center; justify-content: center;
             font-size: 3.3mm; font-weight: 900; flex-shrink: 0; }
  .step .t { font-size: 3.5mm; font-weight: 900; line-height: 1.25; }
  .step .d { font-size: 2.9mm; color: #5a7267; font-weight: 600; margin-left: auto; text-align: right; line-height: 1.3; }
  .foot { margin-top: auto; display: flex; align-items: center; justify-content: space-between;
          background: #123e33; border-radius: 2.5mm; padding: 1.8mm 3mm; color: #fff; }
  .foot .l { font-size: 3.4mm; font-weight: 900; }
  .foot .l small { display: block; font-size: 2.5mm; font-weight: 600; color: #9fd9c3; margin-top: 0.3mm; }
  .foot .r { text-align: right; font-size: 3.8mm; font-weight: 900; color: #ffcf70; line-height: 1.3; letter-spacing: 0; }
  .foot .r small { display: block; font-size: 2.7mm; color: #9fd9c3; font-weight: 700; letter-spacing: -0.02em; }
</style>
